name: Deploy Reports Pages

on:
  push:
    branches:
      - main
    paths:
      - "reports/**"
      - "site_assets/**"
      - "static/**"
      - "scripts/build_reports_site.py"
      - ".github/workflows/deploy-reports-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate HTML reports
        env:
          AUDIT_TARGET_NAME: ${{ vars.AUDIT_TARGET_NAME || 'Security Assessment' }}
          AUDIT_DEFAULT_AUDITOR: ${{ vars.AUDIT_DEFAULT_AUDITOR || 'Security Team' }}
          AUDIT_REPORT_VERSION: ${{ vars.AUDIT_REPORT_VERSION || 'DRAFT v0.1' }}
          AUDIT_REGISTER_PATH: ${{ vars.AUDIT_REGISTER_PATH || 'audit-runs/active/findings-register.md' }}
        run: |
          python3 scripts/run_audit.py report technical --format html || true
          python3 scripts/run_audit.py report executive --format html || true
          python3 scripts/run_audit.py report remediation --format html || true

      - name: Build reports site
        env:
          AUDIT_TARGET_NAME: ${{ vars.AUDIT_TARGET_NAME || 'Security Assessment' }}
          AUDIT_CYCLE: ${{ vars.AUDIT_CYCLE || '—' }}
          AUDIT_MODE: ${{ vars.AUDIT_MODE || 'Passive Review' }}
        run: python3 scripts/build_reports_site.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
